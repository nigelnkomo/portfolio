<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nigel Nkomo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <div class="line__container">
        <div class="separator"></div>
        <div class="separator"></div>
        <div class="separator"></div>
      </div>

      <div class="scroll__container">
        <header class="hero">
          <div class="hero__container">
            <div class="hero__title">
              <h1 class="text__animation">Hello!</h1>
            </div>
            <div class="hero__image">
              <img
                src="./images/memoji.png"
                alt="a memoji"
                class="hero__memoji"
              />
            </div>
            <div class="hero__title">
              <h2>My name's <span class="">Nigel.</span></h2>
            </div>
          </div>
        </header>

        <section id="about">
          <div class="about__container">
            <div class="about__text">
              <p>
                I’m a Computer Systems Engineering student fascinated by the
                interplay of technology, creativity, and human potential. My
                world is shaped by a love for science, design, and the pursuit
                of understanding whether through coding, yoga, or reimagining
                spaces.
              </p>
            </div>
          </div>
        </section>

        <section id="video">
          <div class="shim"></div>
          <div class="video__sticky">
            <video
              autoplay
              muted
              loop
              playsinline
              src="./videos/yoga.mp4"
              class="main__video"
            ></video>
            <div class="video__text__overlay">
              <h2 class="video__header__left">NAM</h2>
              <h2 class="video__header__right">ASTE</h2>
            </div>
          </div>
        </section>
      </div>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
